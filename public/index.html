<!doctype html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>%WEB_TITLE%</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA standalone mode (cross-browser) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Cukkr" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#ffc81e" />

    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>

    <!-- Splash screen (shown until React mounts) -->
    <style>
      #cukkr-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        transition: opacity 0.25s ease-out;
      }
      #cukkr-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #cukkr-splash-logo {
        width: 120px;
        height: 120px;
        margin-bottom: 20px;
        object-fit: contain;
      }
      #cukkr-splash-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: #1a1a1a;
        letter-spacing: -0.3px;
        margin-bottom: 36px;
      }
      #cukkr-splash-bar {
        width: 48px;
        height: 4px;
        background-color: #f0f0f0;
        border-radius: 4px;
        overflow: hidden;
      }
      #cukkr-splash-bar-fill {
        width: 40%;
        height: 100%;
        background-color: #ffc81e;
        border-radius: 4px;
        animation: cukkr-bar-slide 1.4s ease-in-out infinite;
      }
      @keyframes cukkr-bar-slide {
        0% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(150%);
        }
        100% {
          transform: translateX(0);
        }
      }
    </style>
  </head>

  <body>
    <noscript> You need to enable JavaScript to run this app. </noscript>

    <!-- Splash screen -->
    <div id="cukkr-splash">
      <img
        id="cukkr-splash-logo"
        src="/cukkr-logo-trans.png"
        alt="Cukkr"
      />
      <div id="cukkr-splash-title">Cukkr</div>
      <div id="cukkr-splash-bar">
        <div id="cukkr-splash-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      (function () {
        var splash = document.getElementById("cukkr-splash");
        if (!splash) return;

        var SAFETY_TIMEOUT = 8000;
        var done = false;

        function removeSplash() {
          if (done) return;
          done = true;
          splash.classList.add("fade-out");
          setTimeout(function () {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 300);
        }

        // Watch for React to render content into #root
        if (window.MutationObserver) {
          var observer = new MutationObserver(function () {
            var root = document.getElementById("root");
            if (root && root.children.length > 0) {
              removeSplash();
              observer.disconnect();
            }
          });
          var root = document.getElementById("root");
          if (root) {
            observer.observe(root, { childList: true, subtree: true });
          }
        }

        // Fallback: remove splash after SAFETY_TIMEOUT
        setTimeout(removeSplash, SAFETY_TIMEOUT);

        // Also listen for DOMContentLoaded for fast detection
        document.addEventListener("readystatechange", function () {
          if (document.readyState === "complete") {
            setTimeout(function () {
              var root = document.getElementById("root");
              if (root && root.children.length > 0) {
                removeSplash();
              }
            }, 500);
          }
        });
      })();
    </script>

    <script>
      // Register service worker for caching (idempotent — safe to call alongside
      // the push-notification registration in pwaNotificationService)
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch(function () {});
      }
    </script>
  </body>
</html>
